global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:3001"]
    metrics_path: "/api/v1/metrics"

  - job_name: "feed-service"
    static_configs:
      - targets: ["feed-service:3002"]
    metrics_path: "/api/v1/metrics"

  - job_name: "job-service"
    static_configs:
      - targets: ["job-service:3003"]
    metrics_path: "/api/v1/metrics"

  - job_name: "event-service"
    static_configs:
      - targets: ["event-service:3004"]
    metrics_path: "/api/v1/metrics"

  - job_name: "messaging-service"
    static_configs:
      - targets: ["messaging-service:3005"]
    metrics_path: "/api/v1/metrics"

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:3006"]
    metrics_path: "/api/v1/metrics"

  - job_name: "research-service"
    static_configs:
      - targets: ["research-service:3007"]
    metrics_path: "/api/v1/metrics"

  - job_name: "analytics-service"
    static_configs:
      - targets: ["analytics-service:3008"]
    metrics_path: "/api/v1/metrics"
