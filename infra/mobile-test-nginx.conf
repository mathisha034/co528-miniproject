worker_processes 1;

events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    server_name localhost;

    # Keycloak passthrough for AppAuth discovery/auth/token endpoints
    location /auth/ {
      proxy_pass http://keycloak:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route expected by mobile client for user profile calls
    location /api/v1/user-service/ {
      proxy_pass http://user-service:3001/api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Basic health endpoint for this gateway
    location = /healthz {
      add_header Content-Type text/plain;
      return 200 'ok';
    }
  }
}
