apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: default
type: Opaque
stringData:
  # Keycloak realm public key — update this with the actual key from:
  # http://localhost:8081/realms/miniproject (under Keys → RS256 → Public key)
  JWT_PUBLIC_KEY: "REPLACE_WITH_KEYCLOAK_REALM_PUBLIC_KEY"
  KEYCLOAK_PUBLIC_KEY: "REPLACE_WITH_KEYCLOAK_REALM_PUBLIC_KEY"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "miniproject"
