apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: miniproject
spec:
  clusterIP: None
  selector:
    app: keycloak
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: keycloak
  namespace: miniproject
spec:
  serviceName: "keycloak"
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:23.0.7
          args: ["start-dev"]
          ports:
            - containerPort: 8080
              name: keycloak
          envFrom:
            - secretRef:
                name: keycloak-secret
