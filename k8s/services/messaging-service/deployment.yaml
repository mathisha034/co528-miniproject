apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: miniproject
  labels:
    app: messaging-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      containers:
        - name: messaging-service
          image: mini_project-messaging-service:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: messaging-service-config
            - secretRef:
                name: mongodb-secret
            - secretRef:
                name: redis-secret
            - secretRef:
                name: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
