# docker-compose.yml — Local Development Stack (root-level)
# Usage: sudo docker compose -f docker-compose.dev.yml up -d

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [miniproject_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [miniproject_net]

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks: [miniproject_net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [miniproject_net]

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rootuser
      MINIO_ROOT_PASSWORD: rootpassword123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [miniproject_net]

  # ─────────────────────────────────────────────
  # OBSERVABILITY
  # ─────────────────────────────────────────────

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infra/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks: [miniproject_net]

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infra/loki/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/snap/docker/common/var-lib-docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    networks: [miniproject_net]

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [miniproject_net]

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, loki]
    networks: [miniproject_net]

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  feed-service:
    build:
      context: ./services/feed-service
      dockerfile: Dockerfile
    container_name: feed-service
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: rootuser
      MINIO_SECRET_KEY: rootpassword123
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  job-service:
    build:
      context: ./services/job-service
      dockerfile: Dockerfile
    container_name: job-service
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: event-service
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  messaging-service:
    build:
      context: ./services/messaging-service
      dockerfile: Dockerfile
    container_name: messaging-service
    environment:
      PORT: 3005
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      PORT: 3006
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3006:3006"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  research-service:
    build:
      context: ./services/research-service
      dockerfile: Dockerfile
    container_name: research-service
    environment:
      PORT: 3007
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: rootuser
      MINIO_SECRET_KEY: rootpassword123
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    environment:
      PORT: 3008
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3008:3008"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  miniproject_net:
    driver: bridge
