# docker-compose.yml — Local Development Stack
# Usage: docker compose up -d
# All microservices + infrastructure in one command

services:

  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [miniproject_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8081
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [miniproject_net]

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks: [miniproject_net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [miniproject_net]

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rootuser
      MINIO_ROOT_PASSWORD: rootpassword123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks: [miniproject_net]

  # ─────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: user-service
    env_file: ./services/user-service/.env
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  feed-service:
    build:
      context: ./services/feed-service
      dockerfile: Dockerfile
    container_name: feed-service
    env_file: ./services/feed-service/.env
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: rootuser
      MINIO_SECRET_KEY: rootpassword123
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  job-service:
    build:
      context: ./services/job-service
      dockerfile: Dockerfile
    container_name: job-service
    env_file: ./services/job-service/.env
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: event-service
    env_file: ./services/event-service/.env
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  messaging-service:
    build:
      context: ./services/messaging-service
      dockerfile: Dockerfile
    container_name: messaging-service
    env_file: ./services/messaging-service/.env
    environment:
      PORT: 3005
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3005:3005"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    env_file: ./services/notification-service/.env
    environment:
      PORT: 3006
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3006:3006"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  research-service:
    build:
      context: ./services/research-service
      dockerfile: Dockerfile
    container_name: research-service
    env_file: ./services/research-service/.env
    environment:
      PORT: 3007
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: rootuser
      MINIO_SECRET_KEY: rootpassword123
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    env_file: ./services/analytics-service/.env
    environment:
      PORT: 3008
      MONGO_URI: mongodb://mongodb:27017/miniproject_db
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: miniproject
    ports:
      - "3008:3008"
    depends_on:
      mongodb:
        condition: service_healthy
    networks: [miniproject_net]
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:

networks:
  miniproject_net:
    driver: bridge
